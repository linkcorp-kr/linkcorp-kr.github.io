<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linkable</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-color: #f6f8fc;
      --text-color: #173b7a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-color);
      font-family: "Nunito Sans", sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeUp 1s ease-out forwards;
      opacity: 0;
      transform: translateY(18px);
    }

    .curve {
      width: clamp(120px, 20vw, 200px);
      height: clamp(40px, 8vw, 70px);
      border-top: 6px solid var(--text-color);
      border-radius: 50% / 100%;
      margin: 0 auto 16px;
      opacity: 0;
      transform: translateY(10px) scaleX(0.96);
      animation:
        curveIn 1s ease-out 0.15s forwards,
        floatSoft 2.8s ease-in-out 1.2s infinite;
    }

    .logo-text {
      color: var(--text-color);
      font-size: clamp(2.2rem, 7vw, 4.8rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
      opacity: 0;
      transform: translateY(14px);
      animation: textIn 0.9s ease-out 0.3s forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes curveIn {
      to {
        opacity: 0.95;
        transform: translateY(0) scaleX(1);
      }
    }

    @keyframes textIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatSoft {
      0%,
      100% {
        transform: translateY(0) scaleX(1);
      }
      50% {
        transform: translateY(-2px) scaleX(1.015);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .container,
      .curve,
      .logo-text {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="curve"></div>
    <div class="logo-text">Linkable</div>
  </div>
</body>
</html>
