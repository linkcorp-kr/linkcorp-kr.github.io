<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Linkable - 관리자 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2D6A4F;
      --primary-light: #40916C;
      --primary-bg: #F0F7F4;
      --accent-blue: #3D7A8A;
      --accent-orange: #E67E22;
      --accent-red: #E74C3C;
      --accent-purple: #8E44AD;
      --text-dark: #1A1A2E;
      --text-mid: #4A4A5A;
      --text-light: #8A8A9A;
      --bg-white: #FFFFFF;
      --bg-gray: #F4F5F7;
      --bg-card: #FFFFFF;
      --border: #E2E5E9;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg-gray);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 헤더 */
    .header {
      background: var(--primary);
      color: white;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header-badge {
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .refresh-btn {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.25); }

    .last-updated {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }

    /* 컨테이너 */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ============================================
       요약 카드 그리드
       ============================================ */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .summary-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }

    .summary-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
    }

    .summary-card.green::before { background: var(--primary); }
    .summary-card.blue::before { background: var(--accent-blue); }
    .summary-card.orange::before { background: var(--accent-orange); }
    .summary-card.purple::before { background: var(--accent-purple); }

    .summary-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      line-height: 1.1;
    }

    .summary-sub {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* ============================================
       상태 바
       ============================================ */
    .status-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .status-bar-wrap {
      display: flex;
      height: 32px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg-gray);
      margin-bottom: 12px;
    }

    .status-bar-segment {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      transition: width 0.5s ease;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .status-bar-segment.waiting { background: var(--accent-orange); }
    .status-bar-segment.completed { background: var(--primary); }
    .status-bar-segment.progress { background: var(--accent-blue); }
    .status-bar-segment.cancelled { background: #BDC3C7; }

    .status-legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-mid);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-dot.waiting { background: var(--accent-orange); }
    .legend-dot.completed { background: var(--primary); }
    .legend-dot.progress { background: var(--accent-blue); }
    .legend-dot.cancelled { background: #BDC3C7; }

    .legend-count {
      font-weight: 700;
    }

    /* ============================================
       2열 레이아웃
       ============================================ */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .col-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
    }

    /* 파트너 랭킹 */
    .ranking-list { list-style: none; }

    .ranking-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg-gray);
      gap: 12px;
    }
    .ranking-item:last-child { border-bottom: none; }

    .ranking-rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .ranking-rank.top1 { background: #FFF3CD; color: #856404; }
    .ranking-rank.top2 { background: #E8E8E8; color: #555; }
    .ranking-rank.top3 { background: #FCE4CC; color: #8B5E3C; }
    .ranking-rank.other { background: var(--bg-gray); color: var(--text-light); }

    .ranking-name {
      flex: 1;
      font-weight: 600;
      font-size: 14px;
    }

    .ranking-badges {
      display: flex;
      gap: 4px;
    }

    .ranking-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .ranking-badge.w { background: #FEF3E2; color: #E67E22; }
    .ranking-badge.c { background: #E8F5E9; color: #2D6A4F; }
    .ranking-badge.p { background: #E3F2FD; color: #1976D2; }

    .ranking-total {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-dark);
      min-width: 36px;
      text-align: right;
    }

    /* 차종별 */
    .vehicle-list { list-style: none; }

    .vehicle-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .vehicle-name {
      font-size: 14px;
      font-weight: 600;
      min-width: 80px;
    }

    .vehicle-bar-bg {
      flex: 1;
      height: 24px;
      background: var(--bg-gray);
      border-radius: 4px;
      overflow: hidden;
    }

    .vehicle-bar {
      height: 100%;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      font-size: 11px;
      font-weight: 700;
      color: white;
      transition: width 0.5s ease;
    }

    .vehicle-bar.sedan { background: var(--primary); }
    .vehicle-bar.suv { background: var(--accent-blue); }
    .vehicle-bar.none { background: #BDC3C7; }
    .vehicle-bar.other { background: var(--accent-purple); }

    .vehicle-count {
      font-size: 14px;
      font-weight: 700;
      min-width: 30px;
      text-align: right;
    }

    /* ============================================
       최근 예약 테이블
       ============================================ */
    .table-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .table-header {
      padding: 20px 24px 12px;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--bg-gray);
      padding: 10px 14px;
      text-align: left;
      font-weight: 700;
      font-size: 12px;
      color: var(--text-light);
      white-space: nowrap;
      position: sticky;
      top: 0;
    }

    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--bg-gray);
      white-space: nowrap;
    }

    tbody tr:hover { background: #FAFBFC; }

    .status-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .status-tag.waiting { background: #FEF3E2; color: #E67E22; }
    .status-tag.completed { background: #E8F5E9; color: #2D6A4F; }
    .status-tag.progress { background: #E3F2FD; color: #1976D2; }
    .status-tag.cancelled { background: #F5F5F5; color: #999; }

    .phone-blur {
      filter: blur(3px);
      transition: filter 0.2s;
      cursor: pointer;
    }
    .phone-blur:hover, .phone-blur.revealed { filter: none; }

    .customer-link {
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dashed var(--primary);
      transition: color 0.2s;
    }
    .customer-link:hover { color: var(--primary-light); }

    /* 상세 팝업 */
    .detail-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      align-items: center; justify-content: center; padding: 16px;
    }
    .detail-overlay.show { display: flex; }

    .detail-modal {
      background: white; border-radius: 16px;
      padding: 28px 24px; max-width: 440px; width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; padding-bottom: 14px;
      border-bottom: 2px solid var(--bg-gray);
    }
    .detail-header h3 { font-size: 17px; font-weight: 700; }
    .detail-close {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--bg-gray);
      font-size: 18px; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .detail-close:hover { background: var(--border); }

    .detail-grid {
      display: grid; grid-template-columns: 100px 1fr;
      gap: 10px 12px; font-size: 14px;
    }
    .detail-label { font-weight: 600; color: var(--text-light); }
    .detail-value { color: var(--text-dark); word-break: break-word; }
    .detail-inquiry {
      grid-column: 1 / -1;
      margin-top: 12px; padding: 14px;
      background: var(--bg-gray); border-radius: 8px;
      font-size: 14px; line-height: 1.6; color: var(--text-dark);
      min-height: 60px;
    }
    .detail-inquiry-label {
      font-size: 12px; font-weight: 700; color: var(--text-light);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .detail-inquiry-empty { color: var(--text-light); font-style: italic; }

    /* 로그인 화면 */
    .login-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #2D6A4F 0%, #1B4332 100%);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-screen.hidden { display: none; }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 28px;
    }

    .login-input-group {
      margin-bottom: 14px;
      text-align: left;
    }

    .login-input-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 6px;
      display: block;
    }

    .login-input {
      font-family: 'Noto Sans KR', sans-serif;
      width: 100%;
      font-size: 16px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
    }
    .login-input.error { border-color: var(--accent-red); }

    .login-btn {
      font-family: 'Noto Sans KR', sans-serif;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--primary-light); }
    .login-btn:active { transform: scale(0.98); }

    .login-error {
      font-size: 13px;
      color: var(--accent-red);
      margin-top: 10px;
      min-height: 20px;
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .detail-modal { padding: 24px 20px; }
      .detail-grid { grid-template-columns: 80px 1fr; gap: 8px 10px; font-size: 13px; }
    }

    /* 로딩 */
    .loading-overlay {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 15px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    /* ============================================
       반응형
       ============================================ */
    @media (max-width: 900px) {
      .two-col { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .header { padding: 16px; }
      .header-logo { font-size: 18px; }
      .container { padding: 14px 12px 32px; }
      .summary-value { font-size: 26px; }
    }

    @media (max-width: 480px) {
      .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .summary-card { padding: 14px; }
      .summary-value { font-size: 24px; }
      .summary-label { font-size: 11px; }
      .col-card { padding: 16px; }
      .status-section { padding: 16px; }
      .table-header { padding: 16px 16px 8px; }
      thead th, tbody td { padding: 8px 10px; font-size: 12px; }
      .status-legend { gap: 12px; }
      .legend-item { font-size: 12px; }
    }

    @media (max-width: 360px) {
      .header-badge { display: none; }
      .summary-value { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- ★ 로그인 화면 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">Linkable</div>
      <div class="login-sub">관리자 대시보드 접속</div>
      <div class="login-input-group">
        <label class="login-input-label">아이디</label>
        <input type="text" id="loginId" class="login-input" placeholder="관리자 ID" autocomplete="username">
      </div>
      <div class="login-input-group">
        <label class="login-input-label">비밀번호</label>
        <input type="password" id="loginPw" class="login-input" placeholder="비밀번호" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="handleLogin()">로그인</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ★ 상담 상세 팝업 -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
    <div class="detail-modal" onclick="event.stopPropagation()">
      <div class="detail-header">
        <h3 id="detailTitle">상담 예약 상세</h3>
        <button class="detail-close" onclick="closeDetail()">&times;</button>
      </div>
      <div class="detail-grid">
        <span class="detail-label">접수일시</span>
        <span class="detail-value" id="detailDate"></span>
        <span class="detail-label">파트너</span>
        <span class="detail-value" id="detailPartner"></span>
        <span class="detail-label">고객명</span>
        <span class="detail-value" id="detailCustomer"></span>
        <span class="detail-label">전화번호</span>
        <span class="detail-value" id="detailPhone"></span>
        <span class="detail-label">관심차종</span>
        <span class="detail-value" id="detailVehicle"></span>
        <span class="detail-label">통화시간</span>
        <span class="detail-value" id="detailCallTime"></span>
        <span class="detail-label">상태</span>
        <span class="detail-value" id="detailStatus"></span>
      </div>
      <div class="detail-inquiry-label" style="margin-top:16px;">기타 문의사항</div>
      <div class="detail-inquiry" id="detailInquiry"></div>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-left">
      <span class="header-logo">Linkable</span>
      <span class="header-badge">관리자 대시보드</span>
    </div>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="refresh-btn" onclick="loadDashboard()">새로고침</button>
    </div>
  </div>

  <div class="container">
    <!-- 로딩 상태 -->
    <div class="loading-overlay" id="loadingState">
      <div class="loading-spinner"></div>
      데이터를 불러오는 중...
    </div>

    <!-- 대시보드 콘텐츠 -->
    <div id="dashboardContent" style="display:none;">

      <!-- 요약 카드 -->
      <div class="summary-grid">
        <div class="summary-card green">
          <div class="summary-label">전체 상담 예약</div>
          <div class="summary-value" id="totalBookings">0</div>
          <div class="summary-sub" id="totalBookingsSub"></div>
        </div>
        <div class="summary-card blue">
          <div class="summary-label">등록 파트너</div>
          <div class="summary-value" id="totalPartners">0</div>
          <div class="summary-sub">활성 파트너 수</div>
        </div>
        <div class="summary-card orange">
          <div class="summary-label">오늘 예약</div>
          <div class="summary-value" id="todayBookings">0</div>
          <div class="summary-sub">금일 접수건</div>
        </div>
        <div class="summary-card purple">
          <div class="summary-label">이번주 예약</div>
          <div class="summary-value" id="weekBookings">0</div>
          <div class="summary-sub">최근 7일</div>
        </div>
      </div>

      <!-- 상태 바 -->
      <div class="status-section">
        <div class="section-title">처리 현황</div>
        <div class="status-bar-wrap" id="statusBar"></div>
        <div class="status-legend" id="statusLegend"></div>
      </div>

      <!-- 2열: 파트너 랭킹 + 차종 분석 -->
      <div class="two-col">
        <div class="col-card">
          <div class="section-title">파트너별 상담 건수</div>
          <ul class="ranking-list" id="partnerRanking"></ul>
        </div>
        <div class="col-card">
          <div class="section-title">관심 차종 분석</div>
          <ul class="vehicle-list" id="vehicleStats"></ul>
        </div>
      </div>

      <!-- 최근 예약 -->
      <div class="table-section">
        <div class="table-header">
          <div class="section-title">최근 상담 예약</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>접수일시</th>
                <th>파트너</th>
                <th>고객명</th>
                <th>전화번호</th>
                <th>관심차종</th>
                <th>통화시간</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="bookingTable"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ============================================
    // 설정
    // ============================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTxOojQnjK1wbaqAbHl_hGB1_08PiQroJ-fnvPQna0O2lbHR3EY-vLlGamrxZ3qUm_/exec';

    // ============================================
    // 대시보드 데이터 로드 (JSONP)
    // ============================================
    function loadDashboard() {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('dashboardContent').style.display = 'none';

      const old = document.getElementById('dashJsonp');
      if (old) old.remove();

      window._onDashboardLoaded = function(data) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';

        if (data.success) {
          renderDashboard(data);
          document.getElementById('lastUpdated').textContent =
            '업데이트: ' + new Date().toLocaleTimeString('ko-KR');
        }
      };

      const s = document.createElement('script');
      s.id = 'dashJsonp';
      s.src = APPS_SCRIPT_URL + '?action=dashboard&callback=_onDashboardLoaded&_=' + Date.now();
      s.onerror = function() {
        document.getElementById('loadingState').innerHTML =
          '<div class="empty-state">데이터 로드 실패 - 새로고침 해주세요</div>';
      };
      document.body.appendChild(s);
    }

    // ============================================
    // 렌더링
    // ============================================
    function renderDashboard(data) {
      const { summary, statusCount, partnerRanking, vehicleStats, recentBookings } = data;

      // 요약 카드
      document.getElementById('totalBookings').textContent = summary.totalBookings;
      document.getElementById('totalPartners').textContent = summary.totalPartners;
      document.getElementById('todayBookings').textContent = summary.todayBookings;
      document.getElementById('weekBookings').textContent = summary.weekBookings;
      document.getElementById('totalBookingsSub').textContent =
        '대기 ' + (statusCount['대기중']||0) + ' / 완료 ' + (statusCount['상담완료']||0);

      // 상태 바
      renderStatusBar(statusCount, summary.totalBookings);

      // 파트너 랭킹
      renderPartnerRanking(partnerRanking);

      // 차종
      renderVehicleStats(vehicleStats);

      // 최근 예약
      renderBookingTable(recentBookings);
    }

    function renderStatusBar(sc, total) {
      const bar = document.getElementById('statusBar');
      const legend = document.getElementById('statusLegend');

      if (total === 0) {
        bar.innerHTML = '<div style="width:100%;text-align:center;line-height:32px;color:#999;font-size:12px">데이터 없음</div>';
        legend.innerHTML = '';
        return;
      }

      const items = [
        { key: '대기중', cls: 'waiting', label: '대기중' },
        { key: '상담완료', cls: 'completed', label: '상담완료' },
        { key: '계약진행', cls: 'progress', label: '계약진행' },
        { key: '취소', cls: 'cancelled', label: '취소' },
      ];

      bar.innerHTML = items.map(it => {
        const count = sc[it.key] || 0;
        const pct = total > 0 ? (count / total * 100) : 0;
        if (pct === 0) return '';
        return `<div class="status-bar-segment ${it.cls}" style="width:${pct}%">${pct >= 8 ? count + '건' : ''}</div>`;
      }).join('');

      legend.innerHTML = items.map(it => {
        const count = sc[it.key] || 0;
        return `<span class="legend-item"><span class="legend-dot ${it.cls}"></span>${it.label} <span class="legend-count">${count}</span></span>`;
      }).join('');
    }

    function renderPartnerRanking(ranking) {
      const el = document.getElementById('partnerRanking');
      if (!ranking || ranking.length === 0) {
        el.innerHTML = '<li class="empty-state">등록된 파트너가 없습니다</li>';
        return;
      }

      el.innerHTML = ranking.map((p, i) => {
        const rankCls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'other';
        return `
          <li class="ranking-item">
            <span class="ranking-rank ${rankCls}">${i + 1}</span>
            <span class="ranking-name">${esc(p.name)}</span>
            <span class="ranking-badges">
              ${p.waiting ? '<span class="ranking-badge w">대기 '+p.waiting+'</span>' : ''}
              ${p.completed ? '<span class="ranking-badge c">완료 '+p.completed+'</span>' : ''}
              ${p.inProgress ? '<span class="ranking-badge p">진행 '+p.inProgress+'</span>' : ''}
            </span>
            <span class="ranking-total">${p.total}</span>
          </li>`;
      }).join('');
    }

    function renderVehicleStats(stats) {
      const el = document.getElementById('vehicleStats');
      if (!stats || Object.keys(stats).length === 0) {
        el.innerHTML = '<li class="empty-state">데이터 없음</li>';
        return;
      }

      const arr = Object.entries(stats).sort((a, b) => b[1] - a[1]);
      const max = arr[0][1];

      const colorMap = { '세단': 'sedan', 'SUV': 'suv', '정해진 바 없음': 'none' };

      el.innerHTML = arr.map(([name, count]) => {
        const pct = max > 0 ? (count / max * 100) : 0;
        const cls = colorMap[name] || 'other';
        return `
          <li class="vehicle-item">
            <span class="vehicle-name">${esc(name)}</span>
            <div class="vehicle-bar-bg">
              <div class="vehicle-bar ${cls}" style="width:${pct}%">${count}</div>
            </div>
            <span class="vehicle-count">${count}</span>
          </li>`;
      }).join('');
    }

    function renderBookingTable(bookings) {
      const el = document.getElementById('bookingTable');
      if (!bookings || bookings.length === 0) {
        el.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#999">예약 내역이 없습니다</td></tr>';
        return;
      }

      // 전역에 저장 (상세 팝업용)
      window._bookingsData = bookings;

      const statusClsMap = {
        '대기중': 'waiting', '상담완료': 'completed',
        '계약진행': 'progress', '취소': 'cancelled'
      };

      el.innerHTML = bookings.map((b, i) => {
        const cls = statusClsMap[b.status] || 'waiting';
        return `
          <tr>
            <td>${esc(b.date)}</td>
            <td><strong>${esc(b.partnerName)}</strong></td>
            <td><span class="customer-link" onclick="showDetail(${i})">${esc(b.customerName)}</span></td>
            <td><span class="phone-blur" onclick="this.classList.toggle('revealed')">${esc(b.phoneNumber)}</span></td>
            <td>${esc(b.vehicleTypes)}</td>
            <td>${esc(b.callTime)}</td>
            <td><span class="status-tag ${cls}">${esc(b.status)}</span></td>
          </tr>`;
      }).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ============================================
    // ★ 로그인 처리 (Google Sheets 서버 인증)
    // ============================================
    function checkLogin() {
      return sessionStorage.getItem('linkable_admin_logged') === 'true';
    }

    function handleLogin() {
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value;
      const errorEl = document.getElementById('loginError');
      const loginBtn = document.querySelector('.login-btn');

      if (!id || !pw) {
        errorEl.textContent = '아이디와 비밀번호를 입력해 주세요';
        return;
      }

      // 로딩 상태
      loginBtn.disabled = true;
      loginBtn.textContent = '확인 중...';
      errorEl.textContent = '';

      // 기존 스크립트 제거
      const oldScript = document.getElementById('loginJsonp');
      if (oldScript) oldScript.remove();

      // JSONP 콜백
      window._onLoginResult = function(data) {
        loginBtn.disabled = false;
        loginBtn.textContent = '로그인';

        if (data.success) {
          sessionStorage.setItem('linkable_admin_logged', 'true');
          if (data.adminName) {
            sessionStorage.setItem('linkable_admin_name', data.adminName);
          }
          document.getElementById('loginScreen').classList.add('hidden');
          loadDashboard();
        } else {
          errorEl.textContent = data.message || '아이디 또는 비밀번호가 올바르지 않습니다';
          document.getElementById('loginPw').value = '';
          document.getElementById('loginPw').classList.add('error');
          document.getElementById('loginPw').focus();
          setTimeout(() => document.getElementById('loginPw').classList.remove('error'), 1500);
        }
      };

      // JSONP GET 요청으로 서버 인증
      const script = document.createElement('script');
      script.id = 'loginJsonp';
      script.src = APPS_SCRIPT_URL
        + '?action=login&id=' + encodeURIComponent(id)
        + '&pw=' + encodeURIComponent(pw)
        + '&callback=_onLoginResult&_=' + Date.now();
      script.onerror = function() {
        loginBtn.disabled = false;
        loginBtn.textContent = '로그인';
        errorEl.textContent = '서버 연결 실패 - 다시 시도해 주세요';
      };
      document.body.appendChild(script);
    }

    // Enter 키 로그인
    document.getElementById('loginPw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('loginId').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('loginPw').focus();
    });

    // ============================================
    // ★ 상세 팝업
    // ============================================
    function showDetail(index) {
      const b = window._bookingsData[index];
      if (!b) return;

      document.getElementById('detailTitle').textContent = b.customerName + ' 님 상담 상세';
      document.getElementById('detailDate').textContent = b.date || '-';
      document.getElementById('detailPartner').textContent = (b.partnerName || '-') + (b.partnerId ? ' (' + b.partnerId + ')' : '');
      document.getElementById('detailCustomer').textContent = b.customerName || '-';
      document.getElementById('detailPhone').textContent = b.phoneNumber || '-';
      document.getElementById('detailVehicle').textContent = b.vehicleTypes || '미선택';
      document.getElementById('detailCallTime').textContent = b.callTime || '-';
      document.getElementById('detailStatus').textContent = b.status || '-';

      const inquiryEl = document.getElementById('detailInquiry');
      if (b.inquiry && b.inquiry.trim()) {
        inquiryEl.textContent = b.inquiry;
        inquiryEl.classList.remove('detail-inquiry-empty');
      } else {
        inquiryEl.textContent = '문의사항이 없습니다';
        inquiryEl.classList.add('detail-inquiry-empty');
      }

      document.getElementById('detailOverlay').classList.add('show');
    }

    function closeDetail(e) {
      if (e && e.target !== document.getElementById('detailOverlay') && e.type === 'click') return;
      document.getElementById('detailOverlay').classList.remove('show');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        document.getElementById('detailOverlay').classList.remove('show');
      }
    });

    // ============================================
    // 초기 로드 (로그인 체크)
    // ============================================
    if (checkLogin()) {
      document.getElementById('loginScreen').classList.add('hidden');
      loadDashboard();
    } else {
      document.getElementById('loginId').focus();
    }

    // 60초마다 자동 갱신 (로그인 상태일 때만)
    setInterval(function() {
      if (checkLogin()) loadDashboard();
    }, 60000);
  </script>
</body>
</html>
